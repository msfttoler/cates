name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (CLI + service)
        run: npm run typecheck:all

      - name: Test with coverage thresholds
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: CLI smoke test
        run: node dist/cli/index.js fixtures/good --format json --min-score 70
