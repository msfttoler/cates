name: Deploy CATES Service to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'service/**'
      - 'src/**'
      - 'deploy/swa/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.service.json'
      - '.github/workflows/swa-deploy.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build service (CLI + Functions handlers + SPA)
        run: npm run build:service

      - name: Stage SWA bundle
        run: |
          mkdir -p .swa/api .swa/web
          cp -r service/web/* .swa/web/
          cp deploy/swa/staticwebapp.config.json .swa/web/
          cp service/functions/host.json .swa/api/
          # Compiled handler entry from dist-service. The Functions runtime
          # discovers handlers via the v4 programming model from index.js.
          cp -r dist-service/service .swa/api/dist-service-service
          cp -r dist-service/service/functions/* .swa/api/
          # Minimal package.json so the Functions runtime can resolve deps.
          cp service/functions/package.json .swa/api/package.json

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '.swa/web'
          api_location: '.swa/api'
          output_location: ''
          skip_app_build: true
          skip_api_build: true

  close_preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR preview
    steps:
      - name: Close
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
